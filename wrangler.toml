name = "animate-licence-server"
main = "src/index.ts"
compatibility_date = "2025-05-26"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

[[d1_databases]]
binding = "DB"
database_name = "animate-licence-db"
database_id = "e2c38144-73ff-4f84-b1b9-4d859db796ec"

[vars]
CREEM_TEST_MODE = "true"
CREEM_DEFAULT_PLAN_ID = "animate-companion-lifetime-basic-v1"
ADMIN_USERNAME = "admin"
CORS_ORIGINS = "http://localhost:1420,http://127.0.0.1:1420,https://tauri.localhost,tauri://localhost"
DEFAULT_APP_VERSION = "0.1.0"
API_HOSTNAMES = "api.licence.getanimate.app"
ADMIN_HOSTNAMES = "admin.licence.getanimate.app"
ACTIVATE_RATE_LIMIT_IP_MAX = "30"
ACTIVATE_RATE_LIMIT_IP_WINDOW_SECONDS = "60"
ACTIVATE_RATE_LIMIT_IP_FAIL_MAX = "15"
ACTIVATE_RATE_LIMIT_IP_FAIL_WINDOW_SECONDS = "300"
ACTIVATE_RATE_LIMIT_ORDER_FAIL_MAX = "8"
ACTIVATE_RATE_LIMIT_ORDER_FAIL_WINDOW_SECONDS = "3600"

# Secrets (already set, set via: wrangler secret put <NAME>)
#   ADMIN_PASSWORD
#   SESSION_SECRET
#   RSA_PRIVATE_KEY_PKCS8_HEX
#   CREEM_API_KEY
